# Deploy Food Tracker backend to Supabase
#
# Manually triggered workflow that:
#   1. Applies the food_log migration to the Supabase project
#   2. Deploys the parse-food edge function
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — personal access token from supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — database password from Project Settings → Database
#   SUPABASE_PROJECT_REF   — (optional) defaults to ibiszdvdhffvrissciyj
#
# Note: ANTHROPIC_API_KEY must be set as a Supabase function secret via the
# dashboard (Project Settings → Edge Functions → Secrets). It is already used
# by the existing parse-workout function.

name: Deploy Food Tracker to Supabase

on:
  workflow_dispatch:
    inputs:
      skip_migration:
        description: "Skip database migration (deploy function only)"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'ibiszdvdhffvrissciyj' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets are set
        run: |
          if [[ -z "$SUPABASE_ACCESS_TOKEN" ]]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set"
            exit 1
          fi
          if [[ -z "$SUPABASE_DB_PASSWORD" ]]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set"
            exit 1
          fi

      - name: Link Supabase project
        run: supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply migration (food_log table + RLS)
        if: ${{ !inputs.skip_migration }}
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy parse-food edge function
        run: supabase functions deploy parse-food --project-ref "$PROJECT_REF"

      - name: Summary
        run: |
          echo "### Food Tracker backend deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Project: \`$PROJECT_REF\`" >> $GITHUB_STEP_SUMMARY
          echo "- Migration: ${{ inputs.skip_migration && 'skipped' || 'applied' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Edge function: \`parse-food\` deployed" >> $GITHUB_STEP_SUMMARY
